<!DOCTYPE html>
<html>
    <head>
        <title>Reality Cascade</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles.css">
    </head>

    <body>
        <header>
            <h1>Reality Cascade</h1>
            <p id="saves">Game saves every 10s • Saved 0 times</p>
        </header>

        <nav class="tabs">
            <button class="tab active">Energy</button>
            <button class="tab">Dimensions</button>
            <button class="tab">Reality</button>
            <button class="tab">Statistics</button>
            <button class="tab">Settings</button>
        </nav>

        <main>
            <section id="resources" class="tab-content active">
                <div id="energy">Energy: LOADING</div>
                <div id="eps">Energy/sec: LOADING</div>
            </section>

            <section class="upgrades">
                <button id="energyAmplifierBtn">Energy Amplifier (2x): LOADING</button>
                <button id="energyBoostBtn">Energy Boost (1.5x): LOADING</button>
                <button id="energyAccelerateBtn">Accelerate: LOADING</button>
            </section>
        </main>

        <footer>
            Reach <strong>1e-28  Energy</strong> to unlock a new feature.
        </footer>

        <button id="save">Save Game</button>
        <button id="wipe">Wipe Save</button>

        <section id="statistics" class="tab-content">
            <h2>Statistics</h2>

            <p>Total Joules Produced: <span id="totalEnergy">0</span></p>
            <p>Play Time: <span id="playTime">0s</span></p>
        </section>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
